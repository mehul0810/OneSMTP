name: Performance Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  performance-smoke:
    name: Queue/retry performance smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Run performance smoke harness
        run: ./scripts/benchmarks/run-baseline.sh smoke

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: onesmtp-performance-smoke
          path: artifacts/perf/
          if-no-files-found: warn
